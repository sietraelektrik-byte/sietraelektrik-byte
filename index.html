<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sietra Elektrik | LED Aydınlatma Bloğu</title>
    <meta name="google-site-verification" content="659704ea" />
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 600px;
            backdrop-filter: blur(10px);
        }
        .logo-placeholder {
            font-size: 48px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        h1 {
            font-size: 28px;
            margin: 0 0 15px 0;
            color: #38bdf8;
            letter-spacing: 1px;
        }
        p {
            font-size: 16px;
            color: #94a3b8;
            line-height: 1.6;
            margin: 0 0 25px 0;
        }
        .badge {
            display: inline-block;
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #64748b;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-placeholder">💡</div>
        <h1>Sietra Elektrik</h1>
        <p>LED Aydınlatma Bloğu; enerji verimliliği yüksek endüstriyel aydınlatma, akıllı otomasyon sistemleri ve sektörel dijital arşiv entegrasyon merkezidir.</p>
        <span class="badge">Google Verified Security System</span>
        <div class="footer">
            © 2026 Sietra Elektrik. Tüm Hakları Saklıdır.
        </div>
    </div>

</body>
</html>
