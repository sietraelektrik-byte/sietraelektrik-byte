name: Tüm Blog Arşivini Güncelle

on:
  workflow_dispatch: # Manuel tetiklemek için buton açar

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Python Bağımlılıklarını Kur (Hata Veren Kısım Burasıydı)
        run: |
          python -m pip install --upgrade pip
          pip install feedparser beautifulsoup4

      - name: Arşivi Güncelle
        run: python .github/scripts/update_archive.py

      - name: Değişiklikleri Commit Et ve Pushla
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add arsiv/
          git diff-index --quiet HEAD || git commit -m "chore: blog arşivi saf markdown olarak güncellendi"
          git push
