name: Tüm Blog Arşivini Güncelle

on:
  schedule:
    - cron: '0 2 * * *' # Her gece 02:00'da otomatik çalışır
  workflow_dispatch: # İstediğinde elle tetiklemek için

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v3

      - name: Python Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Bağımlılıkları Yükle
        run: |
          pip install feedparser

      - name: Arşivi Senkronize Et
        run: python .github/scripts/update_archive.py

      - name: Değişiklikleri Kaydet ve Gönder
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add arsiv/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: blog arşivi güncellendi (canonical & dofollow)" && git push)

