name: Sietra Uydu Blog & Arşivleyici
on:
  schedule:
    - cron: '0 0 * * *' # Her gece 00:00'da çalışır
  workflow_dispatch: # İstediğinde manuel çalıştırma butonu

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update README and Archive Posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Adım: README'deki son 5 yazıyı güncelle (Mevcut sistemin)
      - name: Pull in blog posts to README
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://ledlamba.com/feed/"
          max_post_count: 5

      # 2. Adım: Yazıları Kalıcı Arşive Kaydet (Python Botu)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install feedparser

      - name: Archive blog posts as files
        run: |
          python - <<EOF
          import feedparser
          import os
          import re

          feed = feedparser.parse("https://ledlamba.com/feed/")
          if not os.path.exists("blog-archive"):
              os.makedirs("blog-archive")

          for entry in feed.entries:
              # Başlığı güvenli bir dosya adına çevir
              clean_title = re.sub(r'[^\w\s-]', '', entry.title).strip().lower()
              clean_title = re.sub(r'[-\s]+', '-', clean_title)
              file_path = os.path.join("blog-archive", f"{clean_title}.md")

              # Eğer dosya yoksa (yeni yazıysa) oluştur
              if not os.path.exists(file_path):
                  with open(file_path, "w", encoding="utf-8") as f:
                      f.write(f"# {entry.title}\n\n")
                      f.write(f"**Yayın Tarihi:** {entry.published}\n\n")
                      # Özet kısmını ekle (HTML temizleyerek)
                      summary = re.sub('<[^<]+?>', '', entry.summary)[:500]
                      f.write(f"{summary}...\n\n")
                      f.write(f"---\n")
                      f.write(f"**Makalenin Tamamı:** [ledlamba.com]({entry.link})\n\n")
                      f.write(f"*Bu içerik Sietra Elektrik teknik arşivi için otomatik oluşturulmuştur.*")
                  print(f"Arşive eklendi: {entry.title}")
          EOF

      # 3. Adım: Yeni dosyaları GitHub'a geri yükle (Push)
      - name: Commit and Push changes
        run: |
          git config --global user.name "Sietra-Bot"
          git config --global user.email "sietraelektrik@gmail.com"
          git add .
          git commit -m "Blog arşivi ve README güncellendi" || exit 0
          git push
