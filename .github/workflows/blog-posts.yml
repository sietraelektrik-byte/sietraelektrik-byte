name: Sietra Uydu Blog & Arşivleyici
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update README and Archive Posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install feedparser

      - name: Archive blog posts as files
        run: |
          python - <<EOF
          import feedparser
          import os
          import re
          import urllib.parse

          feed = feedparser.parse("https://ledlamba.com/feed/")
          os.makedirs("blog-archive", exist_ok=True)

          # Dev.to için standartlara uygun RSS yapısı
          rss_content = '<?xml version="1.0" encoding="UTF-8" ?>\n<rss version="2.0">\n<channel>\n'
          rss_content += '<title>Sietra Elektrik Blog</title>\n<link>https://ledlamba.com</link>\n<description>LED Aydınlatma ve Enerji Çözümleri</description>\n'

          for entry in feed.entries:
              # Linki temizle ve sadece ana URL'yi al
              clean_url = entry.link.strip().split('?')[0]
              
              # Dosya adı oluşturma (SEO uyumlu)
              clean_title = re.sub(r'[^\w\s-]', '', entry.title).strip().lower()
              clean_title = re.sub(r'[-\s]+', '-', clean_title)
              file_path = os.path.join("blog-archive", f"{clean_title}.md")

              # İÇERİK: Front Matter (çizgili kısım) TAMAMEN kaldırıldı. 
              # Dev.to bu bilgileri RSS'ten aldığı için Markdown içinde tekrar görünce hata veriyor.
              with open(file_path, "w", encoding="utf-8") as f:
                  f.write(f"# {entry.title}\n\n")
                  content = entry.content[0].value if 'content' in entry else entry.summary
                  clean_text = re.sub('<[^<]+?>', '', content)
                  f.write(f"{clean_text}\n\n---\n")
                  f.write(f"**Asıl Kaynak:** {clean_url}\n")
                  f.write(f"\n*Bu içerik [Sietra Uydu](https://github.com/sietraelektrik-byte) tarafından otomatik arşivlenmiştir.*")

              # RSS item ekleme
              rss_content += f'<item>\n<title><![CDATA[{entry.title}]]></title>\n<link>{clean_url}</link>\n'
              rss_content += f'<guid isPermaLink="true">{clean_url}</guid>\n'
              rss_content += f'<description><![CDATA[{clean_text[:300]}...]]></description>\n</item>\n'

          rss_content += '</channel>\n</rss>'
          
          with open("feed.xml", "w", encoding="utf-8") as f:
              f.write(rss_content)
          EOF

      - name: Commit and Push changes
        run: |
          git config --global user.name "Sietra-Bot"
          git config --global user.email "sietraelektrik@gmail.com"
          git add .
          git commit -m "Fix: Removed Front Matter and cleaned RSS for Dev.to validation" || exit 0
          git push
