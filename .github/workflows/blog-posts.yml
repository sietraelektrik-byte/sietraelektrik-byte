          python - <<EOF
          import feedparser
          import os
          import re

          feed = feedparser.parse("https://ledlamba.com/feed/")
          os.makedirs("blog-archive", exist_ok=True)

          for entry in feed.entries:
              # Canonical URL'yi tertemiz alalım
              canonical_url = entry.link.strip()
              
              # Dosya adı oluşturma (SEO uyumlu)
              clean_title = re.sub(r'[^\w\s-]', '', entry.title).strip().lower()
              clean_title = re.sub(r'[-\s]+', '-', clean_title)
              file_path = os.path.join("blog-archive", f"{clean_title}.md")

              with open(file_path, "w", encoding="utf-8") as f:
                  f.write(f"# {entry.title}\n\n")
                  f.write(f"**Yayın Tarihi:** {entry.published}\n\n")
                  
                  # WordPress tam metni çekme
                  content = entry.content[0].value if 'content' in entry else entry.summary
                  clean_content = re.sub('<[^<]+?>', '', content)
                  
                  f.write(f"{clean_content}\n\n")
                  f.write(f"---\n")
                  
                  # Dev.to hatasını önlemek için çıplak URL formatı
                  f.write(f"**Asıl Kaynak (Canonical):** {canonical_url}\n\n")
                  f.write(f"*Bu içerik otomatik olarak [Sietra Uydu](https://github.com/sietraelektrik-byte) tarafından arşivlenmiştir.*\n")
          EOF
