name: Sietra Blog Auto Publisher

on:
  schedule:
    # Gunluk 2 kez: 06:00 ve 18:00 UTC
    - cron: '0 6,18 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/blog-posts.yml'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: Run Auto Publisher
      run: python .github/workflows/scripts/update_blog.py
      
    - name: Commit and Push Changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A
        git diff --cached --quiet || (git commit -m "🤖 Auto: Blog arsivleme ve gunluk 2 yazi guncellemesi" && git push)
