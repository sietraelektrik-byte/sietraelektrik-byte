name: Sietra Uydu Blog & Arşivleyici
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update README and Archive Posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install feedparser

      - name: Archive blog posts as files
        run: |
          python - <<EOF
          import feedparser
          import os
          import re

          feed = feedparser.parse("https://ledlamba.com/feed/")
          os.makedirs("blog-archive", exist_ok=True)

          for entry in feed.entries:
              clean_title = re.sub(r'[^\w\s-]', '', entry.title).strip().lower()
              clean_title = re.sub(r'[-\s]+', '-', clean_title)
              file_path = os.path.join("blog-archive", f"{clean_title}.md")

              with open(file_path, "w", encoding="utf-8") as f:
                  f.write(f"# {entry.title}\n\n")
                  f.write(f"**Yayın Tarihi:** {entry.published}\n\n")
                  
                  # Tam metin çekme mantığı
                  content = entry.content[0].value if 'content' in entry else entry.summary
                  clean_content = re.sub('<[^<]+?>', '', content)
                  
                  f.write(f"{clean_content}\n\n")
                  f.write(f"---\n")
                  f.write(f"**Kaynak:** [ledlamba.com]({entry.link})\n\n")
          EOF

      - name: Commit and Push changes
        run: |
          git config --global user.name "Sietra-Bot"
          git config --global user.email "sietraelektrik@gmail.com"
          git add .
          git commit -m "Blog arşivi tam metin olarak güncellendi" || exit 0
          git push
