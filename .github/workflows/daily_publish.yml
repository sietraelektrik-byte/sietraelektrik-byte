name: Daily Technical Post Publisher

on:
  schedule:
    - cron: '0 6 * * *' 
  workflow_dispatch: 

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4  # Versiyon güncellendi (Node.js 24 uyumlu)

      - name: Set up Python
        uses: actions/setup-python@v5 # Versiyon güncellendi
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Prepare Folders
        run: |
          mkdir -p published_posts
          mkdir -p blog-archive

      - name: Run Sietra Publisher Script
        run: python scripts/publisher.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "Automated: Sietra blog update and feed.xml generation" || echo "No changes to commit"
          git push
