name: Daily Technical Post Publisher

on:
  schedule:
    # Her gün Türkiye saatiyle sabah 09:00'da çalışır (UTC 06:00)
    - cron: '0 6 * * *' 
  workflow_dispatch: # Manuel tetikleme butonu

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Sietra Publisher Script
        run: python scripts/publisher.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          # feed.xml dosyasını da takibe ekliyoruz
          git add published_posts/ blog-archive/ feed.xml
          git commit -m "Automated: Posts moved and RSS feed updated" || echo "No changes to commit"
          git push
